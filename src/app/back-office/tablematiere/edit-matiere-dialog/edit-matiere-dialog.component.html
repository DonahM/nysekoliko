<h2 mat-dialog-title style="color: #1e293b; font-weight: 600;">Modifier la matière</h2>
<mat-dialog-content>
  <mat-form-field appearance="outline" style="width: 100%;" class="modern-field">
    <mat-label>Nom de la matière</mat-label>
    <input matInput [(ngModel)]="matiereName">
  </mat-form-field>
  <mat-form-field appearance="outline" style="width: 100%;" class="modern-field">
    <mat-label>Année Scolaire</mat-label>
    <mat-select [(ngModel)]="selectedYear">
      <mat-option *ngFor="let year of data.anneesScolaires" [value]="year.idSchool">
        {{ year.annee_scolaire }}
      </mat-option>
    </mat-select>
  </mat-form-field>
  
  <div *ngIf="errorMessage" style="color: #ef4444; margin-top: 10px; font-size: 14px;">
    {{ errorMessage }}
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end" style="padding-bottom: 20px; padding-right: 24px;">
  <button mat-button (click)="onCancel()" [disabled]="isLoading" style="color: #64748b;">Annuler</button>
  <button mat-raised-button color="primary" (click)="onSave()" [disabled]="isLoading || !matiereName || !selectedYear" style="border-radius: 8px;">
    {{ isLoading ? 'En cours...' : 'Enregistrer' }}
  </button>
</mat-dialog-actions>
